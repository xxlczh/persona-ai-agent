version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: persona-ai-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-persona_ai}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ERNIE_API_KEY=${ERNIE_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - persona-network

  # 前端服务 (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: persona-ai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - persona-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: persona-ai-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-password}
      - MYSQL_DATABASE=${DB_NAME:-persona_ai}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - persona-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: persona-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - persona-network

  # Nginx 反向代理 (可选)
  nginx-proxy:
    image: nginx:alpine
    container_name: persona-ai-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx-compose.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - persona-network

networks:
  persona-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
